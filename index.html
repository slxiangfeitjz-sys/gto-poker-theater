<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTO扑克大剧院 - 记忆宫殿可视化</title>
<style>
:root {
  --bg-dark: #0d0d14;
  --text-primary: #f0e6d3;
  --text-secondary: #b8a99a;
  --accent-gold: #d4a853;
  --accent-red: #c75c5c;
  --accent-green: #5cc78a;
  --accent-blue: #5c8ac7;
  --glass: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(255, 255, 255, 0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'PingFang SC', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== 顶部导航栏 ===== */
.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: rgba(13, 13, 20, 0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 16px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.nav-logo {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent-gold);
  letter-spacing: 2px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-logo .logo-icon {
  font-size: 1.4rem;
}
.nav-links {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-link {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.78rem;
  padding: 6px 12px;
  border-radius: 20px;
  transition: all 0.3s ease;
  white-space: nowrap;
  border: 1px solid transparent;
  cursor: pointer;
  background: none;
  font-family: inherit;
}
.nav-link:hover {
  color: var(--text-primary);
  background: var(--glass);
  border-color: var(--glass-border);
}
.nav-link.active {
  color: var(--accent-gold);
  background: rgba(212, 168, 83, 0.15);
  border-color: rgba(212, 168, 83, 0.4);
  font-weight: 600;
}

/* ===== 移动端菜单按钮 ===== */
.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--accent-gold);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 4px 8px;
}

/* ===== 主内容区 ===== */
.main-frame {
  flex: 1;
  position: relative;
  margin-top: 56px;
  overflow: hidden;
  background: var(--bg-dark);
}
.region-iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ===== 区域加载动画 ===== */
.loading-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-dark);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.4s ease;
}
.loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.spinner {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(212, 168, 83, 0.2);
  border-top-color: var(--accent-gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.loading-text {
  margin-top: 16px;
  color: var(--text-secondary);
  font-size: 0.9rem;
  letter-spacing: 2px;
}

/* ===== 区域导航提示 ===== */
.region-hint {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(13, 13, 20, 0.8);
  backdrop-filter: blur(8px);
  border: 1px solid var(--glass-border);
  border-radius: 30px;
  padding: 8px 20px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  z-index: 50;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
}
.region-hint.show {
  opacity: 1;
}

/* ===== 响应式 ===== */
@media (max-width: 768px) {
  .nav-links {
    position: fixed;
    top: 56px; left: 0; right: 0;
    background: rgba(13, 13, 20, 0.98);
    flex-direction: column;
    padding: 16px;
    gap: 8px;
    border-bottom: 1px solid var(--glass-border);
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    max-height: 60vh;
    overflow-y: auto;
  }
  .nav-links.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .nav-link {
    font-size: 0.9rem;
    padding: 10px 16px;
    text-align: center;
    width: 100%;
  }
  .menu-toggle {
    display: block;
  }
  .top-nav {
    justify-content: space-between;
  }
  .nav-logo {
    font-size: 0.95rem;
  }
}

/* ===== 键盘快捷键提示 ===== */
.shortcut-hint {
  position: fixed;
  bottom: 12px;
  right: 16px;
  background: rgba(13, 13, 20, 0.7);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 0.7rem;
  color: var(--text-secondary);
  z-index: 1000;
  opacity: 0.5;
  transition: opacity 0.3s;
}
.shortcut-hint:hover {
  opacity: 1;
}

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
</style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="top-nav">
  <div class="nav-logo">
    <span class="logo-icon">🎭</span>
    <span>GTO扑克大剧院</span>
  </div>
  <div class="nav-links" id="navLinks">
    <button class="nav-link active" data-region="walkthrough" onclick="switchRegion('walkthrough')">0. 上桌实战</button>
    <button class="nav-link" data-region="range" onclick="switchRegion('range')">1. 范围转盘</button>
    <button class="nav-link" data-region="balance" onclick="switchRegion('balance')">2. 价值/诈唬</button>
    <button class="nav-link" data-region="frequency" onclick="switchRegion('frequency')">3. 频率水滴</button>
    <button class="nav-link" data-region="odds" onclick="switchRegion('odds')">4. 赔率水池</button>
    <button class="nav-link" data-region="gametree" onclick="switchRegion('gametree')">5. 游戏树</button>
    <button class="nav-link" data-region="position" onclick="switchRegion('position')">6. 位置望远镜</button>
    <button class="nav-link" data-region="ev" onclick="switchRegion('ev')">7. EV仪表盘</button>
    <button class="nav-link" data-region="exploitation" onclick="switchRegion('exploitation')">8. 剥削放大镜</button>
  </div>
  <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()">☰</button>
</nav>

<!-- 主内容区 -->
<div class="main-frame" id="mainFrame">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">正在加载区域...</div>
  </div>
  <iframe class="region-iframe" id="regionIframe" src="gto-theater-walkthrough.html"></iframe>
</div>

<!-- 区域提示 -->
<div class="region-hint" id="regionHint"></div>

<!-- 快捷键提示 -->
<div class="shortcut-hint">快捷键: 1-9 切换区域 | ← → 快速浏览 | M 菜单</div>

<script>
// ===== 区域配置 =====
const regions = [
  { id: 'walkthrough', name: '上桌实战', file: 'gto-theater-walkthrough.html', desc: '从发牌到摊牌的决策流程' },
  { id: 'range', name: '范围转盘', file: 'gto-theater-range.html', desc: '探索你的起手范围' },
  { id: 'balance', name: '价值/诈唬天平', file: 'gto-theater-balance.html', desc: '平衡你的下注策略' },
  { id: 'frequency', name: '频率水滴管', file: 'gto-theater-frequency.html', desc: '调整混合策略频率' },
  { id: 'odds', name: '赔率水池', file: 'gto-theater-odds.html', desc: '计算底池赔率' },
  { id: 'gametree', name: '游戏树迷宫', file: 'gto-theater-gametree.html', desc: '规划决策路径' },
  { id: 'position', name: '位置望远镜', file: 'gto-theater-position.html', desc: '利用位置优势' },
  { id: 'ev', name: 'EV仪表盘', file: 'gto-theater-ev.html', desc: '最大化期望值' },
  { id: 'exploitation', name: '剥削放大镜', file: 'gto-theater-exploitation.html', desc: '发现并剥削对手漏洞' }
];

let currentRegionIndex = 0;
const iframe = document.getElementById('regionIframe');
const loadingOverlay = document.getElementById('loadingOverlay');
const regionHint = document.getElementById('regionHint');
const navLinks = document.getElementById('navLinks');
const menuToggle = document.getElementById('menuToggle');

// ===== 切换区域 =====
function switchRegion(regionId) {
  const index = regions.findIndex(r => r.id === regionId);
  if (index === -1 || index === currentRegionIndex) return;
  
  currentRegionIndex = index;
  const region = regions[index];
  
  // 显示加载
  loadingOverlay.classList.remove('hidden');
  
  // 更新导航高亮
  document.querySelectorAll('.nav-link').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
  
  // 关闭移动端菜单
  navLinks.classList.remove('open');
  
  // 加载新区域
  iframe.src = region.file;
  
  // 显示提示
  showHint(region.name + ' — ' + region.desc);
}

// ===== 显示提示 =====
function showHint(text) {
  regionHint.textContent = text;
  regionHint.classList.add('show');
  setTimeout(() => {
    regionHint.classList.remove('show');
  }, 2500);
}

// ===== iframe加载完成 =====
iframe.onload = function() {
  loadingOverlay.classList.add('hidden');
  
  try {
    // 隐藏内部导航栏
    const doc = iframe.contentDocument;
    const nav = doc.querySelector('.nav-bar, nav');
    if (nav) nav.style.display = 'none';
    
    // 调整section padding（移除为内部导航栏预留的空间）
    const sections = doc.querySelectorAll('.section, section');
    sections.forEach(s => {
      s.style.paddingTop = '40px';
    });
    
    // 调整body padding
    if (doc.body) {
      doc.body.style.paddingTop = '0';
    }
  } catch (e) {
    // 跨域安全限制，忽略
  }
};

// ===== 移动端菜单 =====
function toggleMenu() {
  navLinks.classList.toggle('open');
  menuToggle.textContent = navLinks.classList.contains('open') ? '✕' : '☰';
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', function(e) {
  // 数字键 1-9 切换区域 (1=上桌实战, 2=范围, ..., 9=剥削)
  if (e.key >= '1' && e.key <= '9') {
    const index = parseInt(e.key) - 1;
    if (index < regions.length) {
      switchRegion(regions[index].id);
    }
  }
  // M 键切换菜单
  if (e.key === 'm' || e.key === 'M') {
    toggleMenu();
  }
  // 左右箭头切换区域
  if (e.key === 'ArrowRight') {
    const next = (currentRegionIndex + 1) % regions.length;
    switchRegion(regions[next].id);
  }
  if (e.key === 'ArrowLeft') {
    const prev = (currentRegionIndex - 1 + regions.length) % regions.length;
    switchRegion(regions[prev].id);
  }
});

// ===== 初始化 =====
window.addEventListener('load', function() {
  loadingOverlay.classList.add('hidden');
  showHint('欢迎来到GTO扑克大剧院！使用导航或快捷键探索各区域');
});
</script>

</body>
</html>
